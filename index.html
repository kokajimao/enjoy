<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ステージ制ブロック崩し</title>
<style>
body {
    margin: 0;
    background: #111;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}
canvas {
    background: #222;
}
</style>
</head>
<body>

<canvas id="gameCanvas" width="600" height="450"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

// ===== ステージ定義 =====
const stages = [
[
"1111111111",
"1111111111",
"1111111111",
"1111111111"
],
[
"1000000001",
"1111111111",
"1000000001",
"1111111111"
],
[
"1010101010",
"0101010101",
"1111111111",
"0001110000"
]
];

let currentStage = 0;

// ===== ブロックサイズ =====
const brickWidth = 50;
const brickHeight = 15;
const padding = 5;
const offsetTop = 50;
const offsetLeft = 50;

const wallThickness = 10;
const holeWidth = 120;

// ===== ボール =====
let balls;
const ballRadius = 6;

// ===== パドル =====
let paddleWidth = 100;
let paddleHeight = 10;
let paddleX = 250;

let rightPressed = false;
let leftPressed = false;

// ===== アイテム =====
let items = [];
let itemActive = false;
let destroyedCount = 0;

// ===== 初期化 =====
function initStage() {
    let map = stages[currentStage];
    bricks = [];
    destroyedCount = 0;

    for (let c = 0; c < map[0].length; c++) {
        bricks[c] = [];
        for (let r = 0; r < map.length; r++) {
            bricks[c][r] = {
                status: map[r][c] === "1" ? 1 : 0
            };
        }
    }

    // エリア計算
    colCount = map[0].length;
    rowCount = map.length;

    areaWidth = colCount * (brickWidth + padding) - padding;
    areaHeight = rowCount * (brickHeight + padding) - padding;

    leftWall = offsetLeft - wallThickness;
    rightWall = offsetLeft + areaWidth;
    topWall = offsetTop - wallThickness;
    bottomWall = offsetTop + areaHeight;

    // ボール外スタート
    balls = [{ x: 300, y: 420, dx: 3, dy: -3 }];
}

let bricks = [];
let colCount, rowCount;
let areaWidth, areaHeight;
let leftWall, rightWall, topWall, bottomWall;

// ===== 入力 =====
document.addEventListener("keydown", e => {
    if (e.key === "ArrowRight") rightPressed = true;
    if (e.key === "ArrowLeft") leftPressed = true;
});
document.addEventListener("keyup", e => {
    if (e.key === "ArrowRight") rightPressed = false;
    if (e.key === "ArrowLeft") leftPressed = false;
});

// ===== 描画 =====
function drawWalls() {
    ctx.fillStyle = "#888";

    ctx.fillRect(leftWall, topWall, wallThickness, areaHeight + wallThickness);
    ctx.fillRect(rightWall, topWall, wallThickness, areaHeight + wallThickness);
    ctx.fillRect(leftWall, topWall, areaWidth + wallThickness, wallThickness);

    let holeX = leftWall + (areaWidth + wallThickness)/2 - holeWidth/2;

    ctx.fillRect(leftWall, bottomWall, holeX-leftWall, wallThickness);
    ctx.fillRect(holeX+holeWidth, bottomWall,
        (leftWall+areaWidth+wallThickness)-(holeX+holeWidth), wallThickness);
}

function drawBricks() {
    let remaining = 0;

    for (let c = 0; c < colCount; c++) {
        for (let r = 0; r < rowCount; r++) {
            let b = bricks[c][r];
            if (b.status === 1) {
                remaining++;

                let x = c * (brickWidth + padding) + offsetLeft;
                let y = r * (brickHeight + padding) + offsetTop;
                b.x = x;
                b.y = y;

                ctx.fillStyle = "#ff6666";
                ctx.fillRect(x, y, brickWidth, brickHeight);
            }
        }
    }

    // クリア判定
    if (remaining === 0) {
        currentStage++;
        if (currentStage >= stages.length) {
            alert("クリア！");
            location.reload();
        } else {
            alert("ステージ " + (currentStage + 1));
            initStage();
        }
    }
}

function drawBall(ball) {
    ctx.beginPath();
    ctx.arc(ball.x, ball.y, ballRadius, 0, Math.PI * 2);
    ctx.fillStyle = "#00ffff";
    ctx.fill();
}

function drawPaddle() {
    ctx.fillStyle = "#00ff88";
    ctx.fillRect(paddleX, canvas.height - paddleHeight - 10, paddleWidth, paddleHeight);
}

function drawItems() {
    items.forEach(item => {
        ctx.fillStyle = "yellow";
        ctx.fillRect(item.x, item.y, 15, 15);
    });
}

// ===== 衝突 =====
function collision(ball) {
    let holeX = leftWall + (areaWidth + wallThickness)/2 - holeWidth/2;

    if (ball.x < ballRadius || ball.x > canvas.width - ballRadius) {
        ball.dx *= -1;
    }
    if (ball.y < ballRadius) {
        ball.dy *= -1;
    }

    if (ball.y < bottomWall && ball.y > bottomWall - 20) {
        if (ball.x < holeX || ball.x > holeX + holeWidth) ball.dy *= -1;
    }

    if (ball.y > bottomWall && ball.y < bottomWall + 20) {
        if (ball.x < holeX || ball.x > holeX + holeWidth) ball.dy *= -1;
    }

    if (ball.y < topWall + wallThickness && ball.y > topWall) {
        ball.dy *= -1;
    }

    if (
        ball.y > topWall &&
        ball.y < bottomWall &&
        (ball.x < leftWall + wallThickness || ball.x > rightWall)
    ) {
        ball.dx *= -1;
    }

    let paddleY = canvas.height - paddleHeight - 10;
    if (ball.y > paddleY - ballRadius) {
        if (ball.x > paddleX && ball.x < paddleX + paddleWidth) {
            ball.dy = -Math.abs(ball.dy);
        }
    }

    // ブロック
    if (ball.y > topWall && ball.y < bottomWall) {
        for (let c = 0; c < colCount; c++) {
            for (let r = 0; r < rowCount; r++) {
                let b = bricks[c][r];
                if (b.status === 1) {
                    if (
                        ball.x > b.x &&
                        ball.x < b.x + brickWidth &&
                        ball.y > b.y &&
                        ball.y < b.y + brickHeight
                    ) {
                        ball.dy *= -1;
                        b.status = 0;
                        destroyedCount++;

                        if (destroyedCount % 8 === 0 && !itemActive) {
                            items.push({ x: b.x, y: b.y, dy: 2 });
                            itemActive = true;
                        }
                    }
                }
            }
        }
    }
}

// ===== アイテム =====
function updateItems() {
    items.forEach((item, i) => {
        item.y += item.dy;

        let paddleY = canvas.height - paddleHeight - 10;

        if (item.y > paddleY &&
            item.x > paddleX &&
            item.x < paddleX + paddleWidth) {

            let newBalls = [];
            balls.forEach(b => {
                newBalls.push({ ...b });
                newBalls.push({ ...b, dx: -b.dx });
            });
            balls = balls.concat(newBalls);

            items.splice(i, 1);
            itemActive = false;
        }

        if (item.y > canvas.height) {
            items.splice(i, 1);
            itemActive = false;
        }
    });
}

// ===== メイン =====
function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    drawWalls();
    drawBricks();
    drawPaddle();
    drawItems();

    balls.forEach(ball => {
        drawBall(ball);
        collision(ball);
        ball.x += ball.dx;
        ball.y += ball.dy;
    });

    updateItems();

    if (rightPressed) paddleX += 6;
    if (leftPressed) paddleX -= 6;

    requestAnimationFrame(draw);
}

// スタート
initStage();
draw();
</script>

</body>
</html>
