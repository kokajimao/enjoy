<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>狙撃ブロック崩し</title>
<style>
body {
    margin: 0;
    background: #111;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}
canvas {
    background: #222;
}
</style>
</head>
<body>

<canvas id="gameCanvas" width="600" height="450"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

// ===== ブロック =====
const rowCount = 8;
const colCount = 10;
const brickWidth = 50;
const brickHeight = 15;
const padding = 5;
const offsetTop = 50;
const offsetLeft = 50;

const areaWidth = colCount * (brickWidth + padding) - padding;
const areaHeight = rowCount * (brickHeight + padding) - padding;

// ===== 壁 =====
const wallThickness = 10;
const holeWidth = 120;

// ===== 壁座標 =====
const leftWall = offsetLeft - wallThickness;
const rightWall = offsetLeft + areaWidth;
const topWall = offsetTop - wallThickness;
const bottomWall = offsetTop + areaHeight;

// ===== ボール（外スタート） =====
let balls = [{ x: 300, y: 420, dx: 3, dy: -3 }];
const ballRadius = 6;

// ===== パドル =====
let paddleWidth = 100;
let paddleHeight = 10;
let paddleX = 250;

let rightPressed = false;
let leftPressed = false;

// ===== ブロック =====
let bricks = [];
let destroyedCount = 0;

for (let c = 0; c < colCount; c++) {
    bricks[c] = [];
    for (let r = 0; r < rowCount; r++) {
        bricks[c][r] = { x: 0, y: 0, status: 1 };
    }
}

// ===== アイテム =====
let items = [];
let itemActive = false;

// ===== 入力 =====
document.addEventListener("keydown", e => {
    if (e.key === "ArrowRight") rightPressed = true;
    if (e.key === "ArrowLeft") leftPressed = true;
});
document.addEventListener("keyup", e => {
    if (e.key === "ArrowRight") rightPressed = false;
    if (e.key === "ArrowLeft") leftPressed = false;
});

// ===== 描画 =====
function drawWalls() {
    ctx.fillStyle = "#888";

    ctx.fillRect(leftWall, topWall, wallThickness, areaHeight + wallThickness);
    ctx.fillRect(rightWall, topWall, wallThickness, areaHeight + wallThickness);
    ctx.fillRect(leftWall, topWall, areaWidth + wallThickness, wallThickness);

    let holeX = leftWall + (areaWidth + wallThickness) / 2 - holeWidth / 2;

    ctx.fillRect(leftWall, bottomWall, holeX - leftWall, wallThickness);
    ctx.fillRect(
        holeX + holeWidth,
        bottomWall,
        (leftWall + areaWidth + wallThickness) - (holeX + holeWidth),
        wallThickness
    );
}

function drawBricks() {
    for (let c = 0; c < colCount; c++) {
        for (let r = 0; r < rowCount; r++) {
            let b = bricks[c][r];
            if (b.status === 1) {
                let x = c * (brickWidth + padding) + offsetLeft;
                let y = r * (brickHeight + padding) + offsetTop;
                b.x = x;
                b.y = y;

                ctx.fillStyle = "#ff6666";
                ctx.fillRect(x, y, brickWidth, brickHeight);
            }
        }
    }
}

function drawBall(ball) {
    ctx.beginPath();
    ctx.arc(ball.x, ball.y, ballRadius, 0, Math.PI * 2);
    ctx.fillStyle = "#00ffff";
    ctx.fill();
}

function drawPaddle() {
    ctx.fillStyle = "#00ff88";
    ctx.fillRect(paddleX, canvas.height - paddleHeight - 10, paddleWidth, paddleHeight);
}

function drawItems() {
    items.forEach(item => {
        ctx.fillStyle = "yellow";
        ctx.fillRect(item.x, item.y, 15, 15);
    });
}

// ===== 衝突 =====
function collision(ball) {
    let holeX = leftWall + (areaWidth + wallThickness) / 2 - holeWidth / 2;

    // 左右（外でも内でも共通）
    if (ball.x < ballRadius || ball.x > canvas.width - ballRadius) {
        ball.dx *= -1;
    }

    // 上端
    if (ball.y < ballRadius) {
        ball.dy *= -1;
    }

    // ===== 壁エリアとの関係 =====

    // 下→中へ（侵入）
    if (ball.y < bottomWall && ball.y > bottomWall - 20) {
        if (ball.x < holeX || ball.x > holeX + holeWidth) {
            ball.dy *= -1; // 壁
        }
    }

    // 中→下へ（脱出）
    if (ball.y > bottomWall && ball.y < bottomWall + 20) {
        if (ball.x < holeX || ball.x > holeX + holeWidth) {
            ball.dy *= -1;
        }
    }

    // 上壁（内部のみ）
    if (ball.y < topWall + wallThickness && ball.y > topWall) {
        ball.dy *= -1;
    }

    // 左右壁（内部）
    if (
        ball.y > topWall &&
        ball.y < bottomWall &&
        (ball.x < leftWall + wallThickness || ball.x > rightWall)
    ) {
        ball.dx *= -1;
    }

    // パドル（外エリア）
    let paddleY = canvas.height - paddleHeight - 10;
    if (ball.y > paddleY - ballRadius) {
        if (ball.x > paddleX && ball.x < paddleX + paddleWidth) {
            ball.dy = -Math.abs(ball.dy);
        }
    }

    // ブロック（内部のみ）
    if (ball.y > topWall && ball.y < bottomWall) {
        for (let c = 0; c < colCount; c++) {
            for (let r = 0; r < rowCount; r++) {
                let b = bricks[c][r];
                if (b.status === 1) {
                    if (
                        ball.x > b.x &&
                        ball.x < b.x + brickWidth &&
                        ball.y > b.y &&
                        ball.y < b.y + brickHeight
                    ) {
                        ball.dy *= -1;
                        b.status = 0;
                        destroyedCount++;

                        if (destroyedCount % 10 === 0 && !itemActive) {
                            items.push({ x: b.x, y: b.y, dy: 2 });
                            itemActive = true;
                        }
                    }
                }
            }
        }
    }
}

// ===== アイテム =====
function updateItems() {
    items.forEach((item, i) => {
        item.y += item.dy;

        let paddleY = canvas.height - paddleHeight - 10;

        if (
            item.y > paddleY &&
            item.x > paddleX &&
            item.x < paddleX + paddleWidth
        ) {
            let newBalls = [];
            balls.forEach(b => {
                newBalls.push({ ...b });
                newBalls.push({ ...b, dx: -b.dx });
            });
            balls = balls.concat(newBalls);

            items.splice(i, 1);
            itemActive = false;
        }

        if (item.y > canvas.height) {
            items.splice(i, 1);
            itemActive = false;
        }
    });
}

// ===== メイン =====
function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    drawWalls();
    drawBricks();
    drawPaddle();
    drawItems();

    balls.forEach(ball => {
        drawBall(ball);
        collision(ball);

        ball.x += ball.dx;
        ball.y += ball.dy;
    });

    updateItems();

    if (rightPressed) paddleX += 6;
    if (leftPressed) paddleX -= 6;

    requestAnimationFrame(draw);
}

draw();
</script>

</body>
</html>
